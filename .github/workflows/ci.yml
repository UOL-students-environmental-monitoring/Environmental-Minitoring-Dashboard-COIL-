name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: ktor-sample

      - name: Run Detekt
        run: ./gradlew detekt
        working-directory: ktor-sample

      - name: Run KtLint
        run: ./gradlew ktlintCheck
        working-directory: ktor-sample

      - name: Run tests
        run: ./gradlew test
        working-directory: ktor-sample

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            ktor-sample/build/reports/tests/
            ktor-sample/build/reports/detekt/
            ktor-sample/build/reports/ktlint/
