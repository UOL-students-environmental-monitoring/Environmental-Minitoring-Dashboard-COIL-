<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environmental Monitor - Trends</title>
    <link rel="stylesheet" href="/static/css/trends.css" />
    <!--
    Chart.js must load before trends.js so new Chart() is defined when drawChart runs
    trends.js uses defer so it runs after all the HTML elements have been built
    -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/trends.js" defer></script>
</head>

<body>

<!--
    Header: matches the dashboard's .site-header structure exactly
    holds nav bar buttons
-->
<header class="site-header">
    <div>
        <!-- eyebrow is the small blue uppercase label above the title,
             same wording as the dashboard -->
        <p class="eyebrow">Livestock environment</p>
        <h1>Environmental Monitoring</h1>
    </div>

    <!--
        .top-nav and .is-active are the same class names the dashboard uses
        , so both pages share the same nav link appearance
    -->
    <nav class="top-nav" aria-label="Primary">
        <a href="/static/index.html">Dashboard</a>
        <a href="/trends" class="is-active" aria-current="page">Trends</a>
        <a href="/static/alerts.html">Alerts</a>
    </nav>
</header>

<main>

    <!--
        .sector is our white card that holds the controls and chart
        Inside it we use .panel-header (same pattern as the dashboard's panel headers)
        to show an eyebrow + h2 above the controls.
    -->
    <div class="sector">

        <!-- panel header: eyebrow + page title, same style as the dashboard panels -->
        <div class="panel-header">
            <div>
                <p class="eyebrow">Trends</p>
                <h2>Activity Overview</h2>
            </div>
        </div>

        <!-- control bar: all the dropdowns and buttons for user interaction -->
        <div class="controls">

            <!--
                Site / herd selector
                options are filled in dynamically by JS when the page loads
                the "Loading sites..." placeholder is replaced by real site names after
            -->
            <div class="control-group">
                <label for="site-select">Site</label>
                <select id="site-select">
                    <option value="">Loading sites...</option>
                </select>
            </div>

            <!--
                Month selector
                available months are January 2023 to December 2023
                december 2023 is selected first since it is the most recent month
                "YYYY-MM" makes it easy to build date strings in JS
            -->
            <div class="control-group">
                <label for="month-select">Month</label>
                <select id="month-select">
                    <option value="2023-01">January 2023</option>
                    <option value="2023-02">February 2023</option>
                    <option value="2023-03">March 2023</option>
                    <option value="2023-04">April 2023</option>
                    <option value="2023-05">May 2023</option>
                    <option value="2023-06">June 2023</option>
                    <option value="2023-07">July 2023</option>
                    <option value="2023-08">August 2023</option>
                    <option value="2023-09">September 2023</option>
                    <option value="2023-10">October 2023</option>
                    <option value="2023-11">November 2023</option>
                    <option value="2023-12" selected>December 2023</option>
                </select>
            </div>

            <!--
                Last-7-days / Full-month toggle
                JS shows this only for most recent month, December 2023
                and hides it for all other months which only show that month
                data-view is a custom attribute that JS reads with button.dataset.view.
            -->
            <div class="control-group" id="time-toggle-group">
                <label>View</label>
                <div class="toggle-group" id="time-toggle">
                    <button data-view="7days" class="selected">Last 7 days</button>
                    <button data-view="month">Full month</button>
                </div>
            </div>

            <!--
                Parameter dropdown
                chooses which sensor field is shown in the chart and in downloads
                temperature is ambientTemperatureC from ReadingDTO
                activity is accelMagG from ReadingDTO
            -->
            <div class="control-group">
                <label for="param-select">Parameter</label>
                <select id="param-select">
                    <option value="temp">Temperature</option>
                    <option value="activity">Activity</option>
                </select>
            </div>

            <!-- thin vertical line separating the chart controls from the download controls -->
            <div class="control-divider"></div>

            <!--
                Format selector
                CSV is plain spreadsheet file
                HTML is formatted table, opens in-browser
            -->
            <div class="control-group">
                <label for="format-select">Format</label>
                <select id="format-select">
                    <option value="csv">CSV</option>
                    <option value="html">HTML</option>
                </select>
            </div>

            <!--
                Download button
                fetches data for the current site, month, and parameter
                saves it to the user's device in the chosen format
                the spacer span keeps it vertically aligned with the other controls
                (a <span> rather than <label> avoids an orphaned-label accessibility error)
            -->
            <div class="control-group">
                <span class="control-label-spacer" aria-hidden="true"></span>
                <button id="download-btn" class="download-btn" aria-label="Download readings as selected format">Download</button>
            </div>

        </div>

        <!-- nessage shown while chart data is being fetched from the API -->
        <div id="loading-message" style="display:none">Chart is loading...</div>

        <!-- message shown only if the API call fails -->
        <div id="error-message" style="display:none">Could not load data.</div>

        <!--
            Chart.js draws the line graph onto this <canvas> element
            div around it controls height without affecting Chart.js settings in CSS
        -->
        <div class="chart-wrapper">
            <canvas id="trends-chart"></canvas>
        </div>

    </div>
</main>
</body>
</html>
