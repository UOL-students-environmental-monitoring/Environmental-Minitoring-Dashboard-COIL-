<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environmental Monitor - Trends</title>
    <link rel="stylesheet" href="/static/css/trends.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/trends.js" defer></script>
</head>

<body>
<header>
    <h1>Environmental Monitor</h1>
    <nav>
        <a href="/static/index.html">Dashboard</a>
        <a href="/trends" class="active">Trends</a>
        <a href="/static/alerts.html">Alerts</a>

    </nav>
</header>


<main>
    <div class="pageTitle">Activity Overview</div>

    <div class="sector">

        <div class="controls">

            <div class="control-group">
                <label for = "site-select">Site</label>
                <select id = "site-select">
                    <option value= "">Loading sites...</option>
                </select>
            </div>

            <div class="control-group">
                <label>Time</label>
                <div class="toggle-group" id="time-toggle">
                    <button data-days="7" class="selected">7 days</button>
                    <button data-days="30">30 days</button>
                </div>
            </div>

            <div class="control-group">
                <label>Parameter</label>
                <div class="toggle-group" id="param-toggle">
                    <button data-param="temp" class="selected">Temp</button>
                    <button data-param="activity">Activity</button>
                </div>
            </div>

        </div>

        <div id="loading-message" style="display:none">Chart is loading...</div>

        <div id="error-message" style="display:none">Could not load data</div>

        <div class="chart-wrapper">
            <canvas id="trends-chart"></canvas>
        </div>

    </div>
</main>
</body>
