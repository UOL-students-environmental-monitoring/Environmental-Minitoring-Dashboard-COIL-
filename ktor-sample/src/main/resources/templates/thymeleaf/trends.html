<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environmental Monitor - Trends</title>
    <link rel="stylesheet" th:href="@{/static/css/trends.css}" />
    <!--
    Chart.js is a free JavaScript library that draws charts on a <canvas>.
    loads before trend.js since trend.js uses it
    -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
<!-- Header: left is title, navigation links on right, top of the page -->
<header>
    <h1>Environmental Monitor</h1>
    <nav>
        <!--
            th:href="@{/dashboard}" links to the Ktor route/dashboard.
        -->
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/trends}" class="active">Trends</a>
        <a th:href="@{/alerts}">Alerts</a>
        <a th:href="@{/portal}">Portal</a>

    </nav>
</header>


<main>
    <div class="pageTitle">Activity Overview</div>

    <div class="sector">

        <!-- dropdown menus: site-toggle, parameter-toggle, time-toggle -->
        <div class="controls">

            <!--
                site / Herd toggle
                options are filled in dynamically by JavaScript on page load
            -->
            <div class="control-group">
                <label for = "site-select">Site</label>
                <select id = "site-select">
                    <option value= "">Loading sites...</option>
                </select>
            </div>

            <!-- Time range toggle.
                 data-days is a custom attribute that JavaScript reads with
                 button.dataset.days to know how many days were selected
            -->
            <div class="control-group">
                <label>Time</label>
                <div class="toggle-group" id="time-toggle">
                    <button data-days="7" class="selected">7 days</button>
                    <button data-days="30">30 days</button>
                </div>
            </div>

            <!-- Parameter toggle.
                 data-param is read by JavaScript to decide which parameter
                 from response from the API to plot on the Y axis
            -->
            <div class="control-group">
                <label>Parameter</label>
                <div class="toggle-group" id="param-toggle">
                    <button data-param="temp" class="selected">Temp</button>
                    <button data-param="activity">Activity</button>
                </div>
            </div>

        </div>

        <!-- shown when data is loading from the API -->
        <div id="loading-message">Chart is loading...</div>

        <!-- shown only if the API call fails -->
        <div id="no-load-message">Could not load data</div>

        <!--
            Chart.js draws the graph onto this <canvas> element,
            the surrounding div lets us control height with CSS
        -->
        <div class="chart-wrapper">
            <canvas id="trends-chart"></canvas>
        </div>

    </div>
</main>
</body>
