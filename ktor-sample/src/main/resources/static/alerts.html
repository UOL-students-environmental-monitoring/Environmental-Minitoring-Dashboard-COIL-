<!-- Alerts Page - serves three main personas:
     Tom:       mobile-friendly, instant load, clear critical/warning labels
     Priya:     site ID on every card so she can see which herd triggered it
     Dr. Sarah: filter chips to switch between alert conditions
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerts - Environmental Monitor</title>
    <style>

        /* -- Design tokens --------------------------------------------------
           These are the exact same CSS variables used in the dashboard
           (style.css) and trends page (trends.css) so all three pages
           share the same colours, spacing, and feel.
        ------------------------------------------------------------------ */
        :root {
            --bg:            #f6f7f2;   /* warm off-white page background */
            --surface:       #ffffff;   /* card / input background */
            --surface-muted: #eef2ea;   /* soft green tint for small tags */
            --ink:           #18211d;   /* near-black for body text */
            --muted:         #68756d;   /* grey-green for secondary text */
            --line:          #d8dfd6;   /* border colour */
            --accent:        #24745a;   /* main green - active buttons */
            --accent-strong: #14503f;   /* darker green for hover */
            --amber:         #b56b1d;   /* orange-ish for warning severity */
            --danger:        #b63d32;   /* red for critical severity */
            --blueprint:     #1c67d2;   /* blue for the eyebrow label */
            --shadow:        0 18px 40px rgba(38, 48, 42, 0.08);
            --radius:        8px;
            --space:         clamp(1rem, 2vw, 1.5rem);
        }

        /* reset box model and remove default margins / padding everywhere */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* browsers don't inherit fonts on form elements by default, so force it */
        button, select, input { font: inherit; }

        /* page background - the two stacked gradients draw the faint grid
           pattern you can see on the dashboard and trends pages */
        body {
            min-height: 100vh;
            background:
                linear-gradient(90deg, rgba(28, 103, 210, 0.04) 1px, transparent 1px) 0 0 / 24px 24px,
                linear-gradient(rgba(28, 103, 210, 0.035) 1px, transparent 1px) 0 0 / 24px 24px,
                var(--bg);
            color: var(--ink);
            /* Avenir is the dashboard font; fallbacks for Windows / Linux */
            font-family: "Avenir Next", Avenir, "Helvetica Neue", Helvetica, sans-serif;
            font-size: 15px;
        }

        /* -- Site header ----------------------------------------------------
           Same structure as the dashboard and trends pages so it looks
           like one app: brand / title on the left, nav links on the right.
        ------------------------------------------------------------------ */
        .site-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            width: min(1180px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 1.25rem 0 1rem;
            border-bottom: 1px solid var(--line);
        }

        /* small uppercase label above the main heading */
        .eyebrow {
            margin: 0 0 0.25rem;
            color: var(--blueprint);
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        h1, h2, h3, p { margin-top: 0; }

        h1 {
            margin-bottom: 0;
            font-size: clamp(1.45rem, 3vw, 2.25rem);
            line-height: 1.05;
        }

        /* -- Top navigation ----------------------------------------------- */
        .top-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.35rem;
        }

        .top-nav a {
            min-height: 2.35rem;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.72);
            padding: 0.62rem 0.85rem;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }

        .top-nav a:hover,
        .top-nav a:focus {
            border-color: var(--accent);
            color: var(--accent-strong);
            outline: none;
        }

        /* currently active page - solid green fill, white text */
        .top-nav .is-active {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
        }

        /* -- Main content wrapper ----------------------------------------- */
        .page {
            width: min(1180px, calc(100% - 2rem));
            margin: var(--space) auto 2rem;
        }

        /* small line of text showing the alert count for the 24h window */
        .page-meta {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--muted);
            font-size: 0.82rem;
        }

        /* -- Filter bar --------------------------------------------------- */
        .filter-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--line);
        }

        /* pill-shaped filter button */
        .filter-chip {
            font-size: 0.82rem;
            font-weight: 700;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background-color 0.15s;
        }

        .filter-chip:hover {
            border-color: var(--accent);
            color: var(--accent-strong);
        }

        /* active filter chip - green fill, white text */
        .filter-chip.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        /* thin vertical line between groups of filter chips */
        .filter-sep {
            width: 1px;
            height: 18px;
            background: var(--line);
            margin: 0 2px;
        }

        /* -- Site dropdown ------------------------------------------------- */
        .site-filter {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .site-filter label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
        }

        .site-filter select {
            min-height: 2.25rem;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            padding: 0.45rem 1.9rem 0.45rem 0.65rem;
            color: var(--ink);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .site-filter select:focus {
            border-color: var(--accent);
            outline: 3px solid rgba(36, 116, 90, 0.18);
        }

        /* -- Alert list --------------------------------------------------- */
        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        /* shown while loading or when no cards match the current filter */
        .state-msg {
            text-align: center;
            padding: 56px 0;
            font-size: 0.9rem;
            color: var(--muted);
        }

        /* -- Individual alert card ---------------------------------------- */
        /* two-column layout: severity label on the left, details on the right */
        .alert-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 0.85rem 1rem;
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 0 16px;
            align-items: start;
            transition: border-color 0.15s;
        }

        /* green border on hover to match the dashboard card style */
        .alert-card:hover { border-color: var(--accent); }

        /* readings from the CSV file get a left accent border */
        .alert-card.from-readings {
            border-left: 3px solid var(--line);
        }

        /* CRITICAL / WARNING label in the left column */
        .alert-severity {
            font-size: 0.72rem;
            font-weight: 900;
            text-transform: uppercase;
            padding-top: 2px;
            line-height: 1.6;
        }

        /* colour the severity label using the shared design system colours */
        .alert-card.critical .alert-severity { color: var(--danger); }
        .alert-card.warning  .alert-severity { color: var(--amber); }
        .alert-card.normal   .alert-severity { color: var(--muted); }

        /* first row inside the right column: parameter name + small tags */
        .alert-top-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
            flex-wrap: wrap;
        }

        .alert-param {
            font-size: 0.95rem;
            font-weight: 700;
        }

        /* small tag chips for the parameter key and data source */
        .alert-tag,
        .source-tag {
            font-size: 0.72rem;
            color: var(--muted);
            background: var(--surface-muted);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 0.1rem 0.4rem;
        }

        /* source-tag removed */

        /* descriptive message explaining what triggered the alert */
        .alert-message {
            font-size: 0.88rem;
            color: var(--muted);
            line-height: 1.45;
            margin-bottom: 7px;
        }

        /* bottom row: timestamp, site name, action buttons */
        .alert-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .alert-timestamp,
        .alert-site {
            font-size: 0.78rem;
            color: var(--muted);
        }

        /* dot separator before the site name */
        .alert-site::before { content: '· '; }

        /* dismiss button - pushed to the right with margin-left: auto */
        .dismiss-btn {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--muted);
            background: none;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 0.28rem 0.6rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .dismiss-btn:hover {
            color: var(--ink);
            border-color: var(--muted);
        }

        /* GPS track button - only shown on flee event cards */
        .gps-btn {
            font-size: 0.78rem;
            color: var(--danger);
            background: none;
            border: 1px solid var(--danger);
            border-radius: var(--radius);
            padding: 0.28rem 0.6rem;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
        }

        .gps-btn:hover { background: var(--danger); color: #fff; }

        /* slide-out animation played when a card is dismissed */
        .alert-card.removing {
            opacity: 0;
            transform: translateX(6px);
            transition: opacity 0.18s, transform 0.18s;
        }

        /* -- Pagination --------------------------------------------------- */
        /* sits below the alerts list, aligned to the right */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        /* "Page 1 of 3" text */
        .page-info {
            font-size: 0.82rem;
            color: var(--muted);
        }

        /* prev / next buttons - same visual style as the nav links */
        .page-btn {
            min-height: 2.35rem;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.72);
            padding: 0.62rem 0.85rem;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent-strong);
        }

        /* greyed out when there is no previous / next page */
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* -- Toast notification ------------------------------------------- */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--ink);
            color: #fff;
            font-size: 0.82rem;
            padding: 0.6rem 1rem;
            border-radius: var(--radius);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s;
            z-index: 999;
        }

        #toast.show { opacity: 1; }

        /* -- Responsive --------------------------------------------------- */
        @media (max-width: 680px) {
            /* stack the header vertically on small screens */
            .site-header {
                align-items: stretch;
                flex-direction: column;
            }

            .top-nav { justify-content: flex-start; }

            /* narrower severity column on phones */
            .alert-card { grid-template-columns: 72px 1fr; }

            /* hide the dropdowns on mobile - the filter chips are enough */
            .site-filter,
            .source-toggle { display: none; }
        }

    </style>
</head>
<body>

<!-- -- Site header -------------------------------------------------------- -->
<!-- Same structure as dashboard (index.html) and trends (trends.html)
     so all three pages look like they belong to the same app. -->
<header class="site-header">
    <div>
        <p class="eyebrow">Environmental Monitor</p>
        <h1>Alerts</h1>
    </div>
    <!-- Portal removed from nav as it is not part of the main three pages -->
    <nav class="top-nav" aria-label="Primary">
        <a href="/static/index.html">Dashboard</a>
        <a href="/trends">Trends</a>
        <a href="/static/alerts.html" class="is-active" aria-current="page">Alerts</a>
    </nav>
</header>

<div class="page">

    <!-- number of alerts inside the 24-hour window, updated by JS -->
    <span class="page-meta" id="count-label">Loading…</span>

    <!-- -- Filter chips ----------------------------------------------------
         Heat Stress (temperature-only) button removed.
         Low Activity and Heat Collapse buttons are kept and now work
         correctly - the JS below detects those conditions from the raw
         sensor values using the same thresholds as AlertEngine.kt.
    ----------------------------------------------------------------------- -->
    <div class="filter-bar">
        <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
        <button class="filter-chip"        onclick="setFilter('critical', this)">Critical</button>
        <button class="filter-chip"        onclick="setFilter('warning', this)">Warning</button>
        <div class="filter-sep"></div>
        <button class="filter-chip" onclick="setFilter('low_activity', this)">Low Activity</button>
        <button class="filter-chip" onclick="setFilter('flee', this)">Flee Events</button>
        <button class="filter-chip" onclick="setFilter('heat_collapse', this)">Heat Collapse</button>
    </div>

    <!-- site dropdown - re-fetches data for a specific herd -->
    <div class="site-filter">
        <label for="site-select">Site:</label>
        <select id="site-select" onchange="setSite(this.value)">
            <option value="">All sites</option>
            <option value="herd_cattle_A">Cattle Herd A</option>
            <option value="herd_goat_B">Goat Herd B</option>
        </select>
    </div>

    <!-- alert cards are injected here by the render() function -->
    <div class="alerts-list" id="alerts-list">
        <div class="state-msg">Loading alerts…</div>
    </div>

    <!-- prev / page info / next - injected by renderPagination() -->
    <div class="pagination" id="pagination"></div>

</div>

<div id="toast"></div>

<script>

    // -- Thresholds - must match AlertEngine.kt exactly ----------------------
    // If these values change in the backend they need to change here too.
    const WARNING_TEMP_C   = 30.0;  // above this = heat stress warning
    const WARNING_ACCEL_G  = 0.6;   // below this = low activity (warning severity)
    const CRITICAL_ACCEL_G = 0.3;   // below this = low activity (critical severity)

    // -- Page state -----------------------------------------------------------
    let alertsData   = [];      // filled by GET /api/alerts
    let readingsData = [];      // filled by GET /api/readings
    let activeFilter = 'all';   // currently selected filter chip
    let activeSite   = '';      // currently selected site (empty = all sites)
    let currentPage  = 0;       // zero-based page index for pagination

    const CARDS_PER_PAGE = 5;   // how many alert cards to show per page

    // -- init - fetch both endpoints at the same time -------------------------
    // Using Promise.all means both requests go out in parallel, which
    // is faster than waiting for one to finish before starting the next.
    //
    // The readings endpoint always needs a site param, so when "All sites"
    // is selected we fetch both herds separately and combine them.
    async function init() {
        try {
            const siteParam = activeSite ? '?site=' + encodeURIComponent(activeSite) : '';

            if (activeSite) {
                // a specific site is selected - one request each
                const [alertsRes, readingsRes] = await Promise.all([
                    fetch('/api/alerts' + siteParam),
                    fetch('/api/readings?site=' + encodeURIComponent(activeSite))
                ]);
                alertsData   = alertsRes.ok   ? await alertsRes.json()   : [];
                readingsData = readingsRes.ok ? await readingsRes.json() : [];
            } else {
                // no site selected - fetch all three endpoints in parallel:
                // alerts (supports no site param), plus readings for each herd
                const [alertsRes, cattleRes, goatRes] = await Promise.all([
                    fetch('/api/alerts'),
                    fetch('/api/readings?site=herd_cattle_A'),
                    fetch('/api/readings?site=herd_goat_B')
                ]);
                alertsData = alertsRes.ok ? await alertsRes.json() : [];
                // combine both herds into one array
                const cattle = cattleRes.ok ? await cattleRes.json() : [];
                const goats  = goatRes.ok  ? await goatRes.json()  : [];
                readingsData = [...cattle, ...goats];
            }

            render();
        } catch (err) {
            // most likely the server is not running
            document.getElementById('alerts-list').innerHTML =
                '<div class="state-msg" style="color:var(--danger);">' +
                'Could not reach the server. Is it running?<br>' +
                '<small>Start with: ./gradlew run</small></div>';
        }
    }

    // -- get7DayWindow - trims the card list to the last 7 days of data --------
    // Finds the most recent alert on 31 December 2023 and keeps only the
    // cards from the 7 days leading up to that moment.  This gives a
    // stable snapshot rather than an ever-growing list.
    function get7DayWindow(cards) {
        // find all cards that happened on 2023-12-31
        const dec31 = cards.filter(c => c.timestamp.startsWith('2023-12-31'));

        // if there are no Dec 31 cards, just return everything
        // (prevents the page from being blank during development)
        if (dec31.length === 0) return cards;

        // pick the latest timestamp on that day
        // ISO strings sort correctly as plain strings, so > / < work fine
        const mostRecent = dec31.reduce((latest, c) =>
            c.timestamp > latest ? c.timestamp : latest,
            dec31[0].timestamp
        );

        // subtract 7 days to get the start of the window
        const cutoff = new Date(new Date(mostRecent).getTime() - 7 * 24 * 60 * 60 * 1000);

        // keep only cards between cutoff and mostRecent
        return cards.filter(c => {
            const t = new Date(c.timestamp);
            return t >= cutoff && t <= new Date(mostRecent);
        });
    }

    // -- render - builds the card list for the current page ------------------
    function render() {
        const list = document.getElementById('alerts-list');
        list.innerHTML = '';

        // step 1: build a unified card array from whichever sources are on
        let cards = [];

        // --- live alerts from the AlertsLog table ---
        if (true) {
            alertsData.forEach(a => {
                cards.push({
                    id:        'alert-' + a.id,
                    rawId:     a.id,
                    severity:  a.severity.toLowerCase(),   // 'critical' or 'warning'
                    parameter: a.parameter,                 // e.g. 'heat_collapse', 'flee'
                    message:   a.message,
                    timestamp: a.timeStamp,
                    siteId:    a.siteId,
                    isFlee:    a.parameter === 'flee',
                    source:    'alert'
                });
            });
        }

        // --- CSV readings seeded by Databases.kt ---
        if (true) {
            readingsData.forEach(r => {
                // skip rows where no alert conditions were triggered
                if (!r.alertTriggered) return;

                // work out which alert type this reading represents.
                //
                // order of checks matters here - heat_collapse is the most
                // severe combined condition so it is checked first.
                // flee is second because high acceleration overrides low-activity.
                // low_activity comes last for pure movement-based alerts.
                let parameter = 'unknown';
                let severity  = r.status ? r.status.toLowerCase() : 'warning';

                if (r.ambientTemperatureC > WARNING_TEMP_C && r.accelMagG < WARNING_ACCEL_G) {
                    // hot + barely moving = heat collapse risk (always critical)
                    parameter = 'heat_collapse';
                    severity  = 'critical';

                } else if (r.alertFlee || r.accelMagG > 3.0) {
                    // sudden spike in movement = flee / rustling event
                    parameter = 'flee';

                } else if (r.alertLowActivity || r.accelMagG < WARNING_ACCEL_G) {
                    // low movement - how low determines severity
                    parameter = 'low_activity';
                    severity  = r.accelMagG < CRITICAL_ACCEL_G ? 'critical' : 'warning';

                } else if (r.alertGeofence) {
                    parameter = 'geofence';

                } else {
                    // temperature-only alert (no dedicated filter chip, still
                    // appears in All / Critical / Warning views)
                    parameter = 'temperature';
                }

                // build a human-readable message from the raw sensor values
                const tempMsg = r.ambientTemperatureC > WARNING_TEMP_C
                    ? 'Temperature ' + r.ambientTemperatureC.toFixed(1) + '°C - ' +
                      (r.ambientTemperatureC > 35 ? 'critical heat stress risk.' : 'monitor for heat stress.')
                    : '';

                const accelMsg = r.alertFlee
                    ? 'Accelerometer ' + r.accelMagG.toFixed(2) + 'g - flee event detected.'
                    : r.accelMagG < WARNING_ACCEL_G
                        ? 'Accelerometer ' + r.accelMagG.toFixed(2) + 'g - low activity, possible illness.'
                        : '';

                const message = [tempMsg, accelMsg].filter(Boolean).join(' ')
                    || 'Alert flag raised - check reading.';

                cards.push({
                    id:        'reading-' + r.id,
                    rawId:     r.id,
                    severity:  severity,
                    parameter: parameter,
                    message:   message,
                    timestamp: r.timeStamp,
                    siteId:    r.siteId,
                    isFlee:    r.alertFlee,
                    source:    'reading'
                });
            });
        }

        // step 2: sort newest first
        // ISO timestamps sort correctly as plain strings so localeCompare works
        cards.sort((a, b) => b.timestamp.localeCompare(a.timestamp));

        // step 3: trim to the 7-day window ending on the last Dec 31 2023 alert
        const windowed = get7DayWindow(cards);

        // step 4: apply the active filter chip
        const filtered = windowed.filter(c => {
            if (activeFilter === 'all')       return true;
            if (activeFilter === 'critical')  return c.severity === 'critical';
            if (activeFilter === 'warning')   return c.severity === 'warning';
            // 'low_activity', 'flee', 'heat_collapse' - match by parameter name
            return c.parameter === activeFilter;
        });

        // step 5: update the count label
        // the count always reflects the full 24h window, not just the current filter
        document.getElementById('count-label').textContent =
            filtered.length === windowed.length
                ? windowed.length + ' alerts in last 7 days'
                : filtered.length + ' of ' + windowed.length + ' alerts';

        if (filtered.length === 0) {
            list.innerHTML = '<div class="state-msg">No alerts match this filter.</div>';
            renderPagination(0);
            return;
        }

        // step 6: make sure the current page is still within bounds
        // (can go out of range after a dismiss shrinks the list)
        const totalPages = Math.ceil(filtered.length / CARDS_PER_PAGE);
        if (currentPage >= totalPages) currentPage = totalPages - 1;

        // step 7: slice out just the 7 cards for the current page
        const start     = currentPage * CARDS_PER_PAGE;
        const pageCards = filtered.slice(start, start + CARDS_PER_PAGE);

        // step 8: build a DOM element for each card and append it
        pageCards.forEach(card => {
            const el = document.createElement('div');
            el.className = 'alert-card ' + card.severity +
                (card.source === 'reading' ? ' from-readings' : '');
            el.dataset.uid = card.id;  // used by dismiss() to find the element

            // GPS track button only appears on flee events
            const gpsBtn = card.isFlee
                ? `<button class="gps-btn" onclick="trackGPS('${card.id}', '${card.siteId}')">Track GPS</button>`
                : '';

            el.innerHTML = `
                <div class="alert-severity">${card.severity}</div>
                <div>
                    <div class="alert-top-row">
                        <span class="alert-param">${formatParam(card.parameter)}</span>
                        <span class="alert-tag">${card.parameter}</span>
                    </div>
                    <p class="alert-message">${card.message}</p>
                    <div class="alert-footer">
                        <span class="alert-timestamp">${card.timestamp}</span>
                        <span class="alert-site">${card.siteId}</span>
                        ${gpsBtn}
                        <button class="dismiss-btn" onclick="dismiss('${card.id}')">Dismiss</button>
                    </div>
                </div>
            `;

            list.appendChild(el);
        });

        // step 9: draw the pagination controls below the list
        renderPagination(totalPages);
    }

    // -- renderPagination - draws prev / page-info / next below the list -----
    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        container.innerHTML = '';

        // no point showing pagination when everything fits on one page
        if (totalPages <= 1) return;

        // previous page button
        const prevBtn = document.createElement('button');
        prevBtn.className   = 'page-btn';
        prevBtn.textContent = '← Previous';
        prevBtn.disabled    = currentPage === 0;
        prevBtn.onclick     = () => { currentPage--; render(); };

        // "Page X of Y" label
        const info = document.createElement('span');
        info.className   = 'page-info';
        info.textContent = 'Page ' + (currentPage + 1) + ' of ' + totalPages;

        // next page button
        const nextBtn = document.createElement('button');
        nextBtn.className   = 'page-btn';
        nextBtn.textContent = 'Next →';
        nextBtn.disabled    = currentPage >= totalPages - 1;
        nextBtn.onclick     = () => { currentPage++; render(); };

        container.append(prevBtn, info, nextBtn);
    }

    // -- formatParam - turns internal parameter keys into display labels -------
    function formatParam(p) {
        const labels = {
            temperature:   'Heat Stress - Temperature',
            low_activity:  'Low Activity Alert',
            flee:          'Flee / Rustling Event',
            heat_collapse: 'Heat Collapse - Combined Alert',
            geofence:      'Geofence Breach',
            unknown:       'Alert Flagged'
        };
        return labels[p] || p;
    }

    // -- setFilter - called when a filter chip button is clicked --------------
    function setFilter(f, btn) {
        activeFilter = f;
        currentPage  = 0;  // always go back to page 1 when the filter changes
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    // -- setSite - re-fetches from both APIs with the new site param ----------
    function setSite(val) {
        activeSite  = val;
        currentPage = 0;
        init();
    }

    // -- dismiss - removes a card from the page and the local data arrays -----
    function dismiss(uid) {
        const el = document.querySelector('[data-uid="' + uid + '"]');
        if (!el) return;

        // play the slide-out animation, then remove the element from the DOM
        el.classList.add('removing');
        setTimeout(() => {
            el.remove();

            // also remove from the source array so re-renders don't bring it back
            if (uid.startsWith('alert-')) {
                const id = parseInt(uid.replace('alert-', ''));
                alertsData = alertsData.filter(a => a.id !== id);
            } else {
                const id = parseInt(uid.replace('reading-', ''));
                readingsData = readingsData.filter(r => r.id !== id);
            }

            render();
        }, 200);
    }

    // -- trackGPS - navigates to the portal page to show the animal on a map --
    function trackGPS(uid, siteId) {
        showToast('Opening GPS tracker…');
        const rawId = uid.replace('alert-', '').replace('reading-', '');
        setTimeout(() => {
            window.location.href =
                '/static/portal.html?gps=' + rawId + '&site=' + encodeURIComponent(siteId);
        }, 700);
    }

    // -- showToast - briefly shows a small message at the bottom right ---------
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    // start everything when the page loads
    init();

</script>

</body>
